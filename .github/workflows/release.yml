name: Release

# Fires when you publish a GitHub Release (tag convention `v0.1.0`, `v0.2.0-preview`, …).
# The leading `v` is stripped to form the NuGet package version.
# workflow_dispatch is provided for manual dry runs.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to pack (e.g. 0.1.0-preview). For dry runs.'
        required: true
        type: string
      push_to_nuget:
        description: 'Also push to NuGet.org? (release events always push via trusted publishing)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to upload the .nupkg as a release asset
      id-token: write   # required for NuGet trusted publishing (OIDC)
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Resolve version
        id: ver
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          RELEASE_TAG:   ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            v="${RELEASE_TAG#v}"
          else
            v="$INPUT_VERSION"
          fi
          if [ -z "$v" ]; then
            echo "Could not resolve a version (empty)." >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

      - name: Restore
        run: dotnet restore Backstory.slnx

      - name: Build
        run: dotnet build Backstory.slnx -c Release --no-restore /p:Version=${{ steps.ver.outputs.version }}

      - name: Test
        run: dotnet test Backstory.slnx -c Release --no-build --verbosity normal

      - name: Pack tool
        # No --no-build: the RID-trim target runs during the tool's publish step.
        run: dotnet pack src/Backstory.Cli/Backstory.Cli.csproj -c Release -o nupkg /p:Version=${{ steps.ver.outputs.version }}

      - name: Show pack output
        run: ls -lh nupkg/

      - name: Attach .nupkg to the GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: nupkg/*.nupkg

      # Trusted publishing: exchange the GitHub OIDC token for a short-lived NuGet API key.
      # No stored API key. Requires a trusted publishing policy on nuget.org for this repo
      # and workflow file. `user` is the nuget.org account username (public, not a secret).
      - name: NuGet login (OIDC to temporary API key)
        if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.push_to_nuget == 'true')
        id: login
        uses: NuGet/login@v1
        with:
          user: magnanz

      - name: Push to NuGet.org
        if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.push_to_nuget == 'true')
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # Lists Backstory on the official MCP registry. Runs after the NuGet package is live,
  # since the registry validates that the package README contains the mcp-name marker.
  publish-mcp-registry:
    needs: publish
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.push_to_nuget == 'true')
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # mcp-publisher proves repo ownership via GitHub OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set server.json version from the release
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' \
            .mcp/server.json > .mcp/server.json.tmp
          mv .mcp/server.json.tmp .mcp/server.json
          cat .mcp/server.json

      - name: Wait for the NuGet package to be live
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          pkg=$(jq -r '.packages[0].identifier' .mcp/server.json | tr '[:upper:]' '[:lower:]')
          ver=$(echo "$VERSION" | tr '[:upper:]' '[:lower:]')
          url="https://api.nuget.org/v3-flatcontainer/${pkg}/${ver}/readme"
          deadline=$(( $(date +%s) + 1800 ))
          until curl -sfI "$url" >/dev/null; do
            if [ "$(date +%s)" -gt "$deadline" ]; then
              echo "::error::NuGet package $VERSION not available after 30 minutes."
              exit 1
            fi
            echo "Waiting for NuGet validation to finish…"
            sleep 20
          done
          echo "Package $VERSION is live on nuget.org."

      - name: Download mcp-publisher
        run: |
          set -euo pipefail
          curl -sSL -o mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz
          tar -xzf mcp-publisher.tar.gz

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to the MCP registry
        run: ./mcp-publisher publish .mcp/server.json
