name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore Backstory.slnx
      - name: Build
        run: dotnet build Backstory.slnx -c Release --no-restore
      - name: Test
        run: dotnet test Backstory.slnx -c Release --no-build
